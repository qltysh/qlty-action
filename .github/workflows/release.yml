name: Release
on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    # Runs when a release pull request (opened by the Prepare Release
    # workflow, labeled "release") is merged, or on manual dispatch as a
    # fallback. Either way, the version comes from the package.json files
    # on the released commit.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == github.event.repository.default_branch &&
       contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # version 2.0.6
        id: app-token
        with:
          app-id: ${{ vars.QLTY_APP_ID }}
          private-key: ${{ secrets.QLTY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # version 4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version
        id: version
        run: |
          VERSION=$(node -p "require('./coverage/package.json').version")
          FMT_VERSION=$(node -p "require('./fmt/package.json').version")

          if [ "$VERSION" != "$FMT_VERSION" ]; then
            echo "Error: coverage/package.json ($VERSION) and fmt/package.json ($FMT_VERSION) disagree"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/v${VERSION}" > /dev/null; then
            echo "Error: Tag v${VERSION} already exists"
            exit 1
          fi

          echo "Releasing version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_version=$(echo $VERSION | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - name: Validate CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Checking for version $VERSION in CHANGELOG.md"

          # Check if version exists in CHANGELOG.md
          if ! grep -q "^## v${VERSION}" CHANGELOG.md; then
            echo "Error: Version v${VERSION} not found in CHANGELOG.md"
            echo "Please add a changelog entry for v${VERSION} before releasing"
            exit 1
          fi

          echo "Found changelog entry for v${VERSION}"

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the changelog section for this version.
          # Start from the version header and continue until the next version header
          # or end of file.
          CHANGELOG_CONTENT=$(awk "/^## v${VERSION}/{flag=1; next} /^## v[0-9]/{flag=0} flag" CHANGELOG.md)

          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "Warning: No changelog content found for v${VERSION}"
            CHANGELOG_CONTENT="Release v${VERSION}"
          fi

          # Write to file to preserve formatting
          echo "$CHANGELOG_CONTENT" > changelog_content.txt

          echo "Extracted changelog content:"
          cat changelog_content.txt

      - name: Check for changes merged after release preparation
        if: github.event_name == 'pull_request'
        run: |
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          if ! git cat-file -e "$HEAD_SHA" 2> /dev/null; then
            echo "Release branch head $HEAD_SHA is no longer reachable; skipping staleness check"
            exit 0
          fi

          BRANCH_POINT=$(git merge-base "$HEAD_SHA" "${MERGE_SHA}^")
          MISSED=$(git log --oneline --first-parent "${BRANCH_POINT}..${MERGE_SHA}^")

          if [ -n "$MISSED" ]; then
            echo "::warning::Commits landed on the default branch after this release was prepared. Verify the changelog covers them:"
            echo "$MISSED"
          fi

      - name: Create and push tags via GitHub API
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR_VERSION="${{ steps.version.outputs.major_version }}"

          # Get the current commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)

          # Create lightweight tag reference for version (points directly to commit)
          # This should fail if the tag already exists
          gh api \
            --method POST \
            /repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/v${VERSION}" \
            -f sha="$COMMIT_SHA"

          echo "Created tag v${VERSION}"

          # Create or update lightweight tag reference for major version (force update if exists)
          gh api \
            --method POST \
            /repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/v${MAJOR_VERSION}" \
            -f sha="$COMMIT_SHA" \
            2>/dev/null || \
          gh api \
            --method PATCH \
            /repos/${{ github.repository }}/git/refs/tags/v${MAJOR_VERSION} \
            -f sha="$COMMIT_SHA" \
            -F force=true

          echo "Created/updated major version tag v${MAJOR_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file changelog_content.txt \
            --verify-tag
