version: 2
updates:
  # Single npm entry: the repo is one npm workspace with one root lockfile,
  # so Dependabot manages all three actions (install/coverage/fmt) + the
  # shared package from the root.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types:
          - minor
          - patch
